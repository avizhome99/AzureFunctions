<!doctype html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bore Reading</title>
  <style>
    body { font-family: Arial; max-width: 520px; margin: 30px auto; padding: 0 14px; }
    input, textarea, button, select { width: 100%; padding: 12px; margin-top: 10px; box-sizing: border-box; }
    button { background: #0078D4; color: white; border: none; font-size: 16px; }
    button.secondary { background: #444; }
    .row { display: flex; gap: 10px; }
    .row > * { flex: 1; }
    .small { font-size: 12px; color: #666; margin-top: 6px; }
    .success { color: green; }
    .error { color: #b00020; }
    .box { background: #f6f6f6; padding: 12px; border-radius: 8px; margin-top: 10px; }
    .label { margin-top: 14px; font-weight: 600; }
    .meter { font-size: 18px; font-weight: 700; }
    .muted { color: #555; }
    .wheels { display: flex; gap: 8px; margin-top: 10px; }
    .wheels select {
      flex: 1;
      text-align: center;
      font-size: 20px;
      height: 56px;
      padding: 10px;
      border-radius: 10px;
    }
    .chiprow { display:flex; gap:10px; margin-top:10px; }
    .chiprow button { width: auto; padding: 10px 12px; border-radius: 10px; }
    .right { text-align:right; }
    .hidden { display:none; }
  </style>
</head>
<body>

<h2>Submit Bore Reading</h2>

<div class="box">
  <div id="meterDisplay" class="meter"></div>
  <div id="lastDisplay" class="muted"></div>
  <div id="status" class="small"></div>
</div>

<form id="form">
  <input type="hidden" id="meter">

  <div class="label">Reading (5 digits)</div>

  <!-- 5-digit wheel UI -->
  <div class="wheels" aria-label="5 digit reading selector">
    <select id="d1"></select>
    <select id="d2"></select>
    <select id="d3"></select>
    <select id="d4"></select>
    <select id="d5"></select>
  </div>

  <!-- Optional: quick adjust buttons -->
  <div class="chiprow">
    <button type="button" class="secondary" id="btnMinus1">-1</button>
    <button type="button" class="secondary" id="btnPlus1">+1</button>
    <button type="button" class="secondary" id="btnPlus10">+10</button>
    <div style="flex:1"></div>
    <button type="button" class="secondary" id="btnUseLast">Use last</button>
  </div>

  <!-- Still keep the plain input for accessibility / fallback (hidden by default) -->
  <input type="text" id="readingText" class="hidden" inputmode="numeric" pattern="[0-9]{5}" />

  <div class="label">Photo (optional)</div>
  <input type="file" id="photo" accept="image/*" capture="environment">
  <div class="small">Tip: take photo straight-on, keep digits sharp, avoid glare.</div>

  <div class="label">Notes</div>
  <textarea id="notes" rows="3"></textarea>

  <button type="submit" id="submitBtn">Submit</button>
  <p id="message"></p>
</form>

<script>
  // ========= CONFIG (UPDATE THESE) =========
  // 1) New function you create: GetLatestReading
  const GET_LATEST_URL = "https://bore-reading-api-avi-fabag6gva8hgggh8.australiaeast-01.azurewebsites.net/api/GetLatestReading";
  // 2) Your existing submit function
  const SUBMIT_URL      = "https://bore-reading-api-avi-fabag6gva8hgggh8.australiaeast-01.azurewebsites.net/api/SubmitReading";
  // ========================================

  const params = new URLSearchParams(window.location.search);
  const meter = params.get("meter");

  const meterEl   = document.getElementById("meter");
  const meterDisp = document.getElementById("meterDisplay");
  const lastDisp  = document.getElementById("lastDisplay");
  const statusEl  = document.getElementById("status");
  const msgEl     = document.getElementById("message");
  const submitBtn = document.getElementById("submitBtn");

  function setStatus(text) {
    statusEl.textContent = text || "";
  }

  function setMessage(text, isOk) {
    msgEl.className = isOk ? "success" : "error";
    msgEl.textContent = text || "";
  }

  function pad5(nStr) {
    const s = String(nStr ?? "").replace(/\D/g, "");
    return s.padStart(5, "0").slice(-5);
  }

  function buildDigitOptions(selectEl) {
    selectEl.innerHTML = "";
    for (let i = 0; i <= 9; i++) {
      const opt = document.createElement("option");
      opt.value = String(i);
      opt.textContent = String(i);
      selectEl.appendChild(opt);
    }
  }

  const selects = ["d1","d2","d3","d4","d5"].map(id => document.getElementById(id));
  selects.forEach(buildDigitOptions);

  function setWheelsFromReading(reading5) {
    const r = pad5(reading5);
    selects[0].value = r[0];
    selects[1].value = r[1];
    selects[2].value = r[2];
    selects[3].value = r[3];
    selects[4].value = r[4];
    document.getElementById("readingText").value = r;
  }

  function getReadingFromWheels() {
    const r = selects.map(s => s.value).join("");
    document.getElementById("readingText").value = r;
    return r;
  }

  function adjustReading(delta) {
    const current = parseInt(getReadingFromWheels(), 10);
    if (Number.isNaN(current)) return;
    const next = Math.max(0, Math.min(99999, current + delta));
    setWheelsFromReading(String(next).padStart(5,"0"));
  }

  // Keep hidden input synced
  selects.forEach(s => s.addEventListener("change", () => getReadingFromWheels()));

  document.getElementById("btnMinus1").addEventListener("click", () => adjustReading(-1));
  document.getElementById("btnPlus1").addEventListener("click", () => adjustReading(1));
  document.getElementById("btnPlus10").addEventListener("click", () => adjustReading(10));

  let lastReading = null;
  let lastReadingDate = null;

  document.getElementById("btnUseLast").addEventListener("click", () => {
    if (lastReading != null) setWheelsFromReading(lastReading);
  });

  async function loadLatest() {
    if (!meter) {
      meterDisp.textContent = "Invalid QR link (missing ?meter=...)";
      setStatus("");
      submitBtn.disabled = true;
      return;
    }

    meterEl.value = meter;
    meterDisp.textContent = "Meter: " + meter;

    setStatus("Loading last reading…");
    setMessage("");

    try {
      // GET /api/GetLatestReading?meter=xxxx
      const url = GET_LATEST_URL + "?meter=" + encodeURIComponent(meter);
      const resp = await fetch(url, { method: "GET" });

      if (!resp.ok) {
        const t = await resp.text();
        setStatus("");
        lastDisp.textContent = "Couldn’t load last reading (you can still submit).";
        setWheelsFromReading("00000");
        return;
      }

      const data = await resp.json();

      lastReading = pad5(data.lastReading ?? data.reading ?? "");
      lastReadingDate = data.lastReadingDate ?? data.readingDate ?? "";

      lastDisp.textContent =
        "Last: " + lastReading + (lastReadingDate ? (" (" + lastReadingDate + ")") : "");

      setWheelsFromReading(lastReading);
      setStatus("");

    } catch (e) {
      setStatus("");
      lastDisp.textContent = "Couldn’t load last reading (you can still submit).";
      setWheelsFromReading("00000");
    }
  }

  async function fileToBase64(file) {
    const reader = new FileReader();
    return await new Promise((resolve, reject) => {
      reader.onload = () => {
        const result = reader.result || "";
        const base64 = String(result).split(",")[1] || "";
        resolve(base64);
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  document.getElementById("form").addEventListener("submit", async function(e) {
    e.preventDefault();

    setMessage("");
    submitBtn.disabled = true;
    submitBtn.textContent = "Submitting…";

    try {
      const reading = getReadingFromWheels(); // always 5 digits
      const notes = document.getElementById("notes").value || "";
      const file = document.getElementById("photo").files[0];

      let photo = null;
      if (file) photo = await fileToBase64(file);

      // Optional: warn if reading decreased
      if (lastReading != null) {
        const cur = parseInt(reading, 10);
        const prev = parseInt(lastReading, 10);
        if (!Number.isNaN(cur) && !Number.isNaN(prev) && cur < prev) {
          const ok = confirm(`This reading (${reading}) is LOWER than the last (${lastReading}). Submit anyway?`);
          if (!ok) {
            submitBtn.disabled = false;
            submitBtn.textContent = "Submit";
            return;
          }
        }
      }

      const payload = { meter, reading, notes, photo };

      const resp = await fetch(SUBMIT_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      if (resp.ok) {
        setMessage("Submitted successfully ✅", true);
        // update "last" on screen to what was just submitted
        lastReading = reading;
        lastDisp.textContent = "Last: " + lastReading + " (just submitted)";
        document.getElementById("notes").value = "";
        document.getElementById("photo").value = "";
      } else {
        const t = await resp.text();
        setMessage(t || "Submit failed", false);
      }

    } catch (err) {
      setMessage(err?.message || String(err) || "Submit failed", false);
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = "Submit";
    }
  });

  loadLatest();
</script>

</body>
</html>
