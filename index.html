<!doctype html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bore Reading</title>
  <style>
    body { font-family: Arial; max-width: 520px; margin: 30px auto; padding: 0 14px; }
    input, textarea, button, select { width: 100%; padding: 12px; margin-top: 10px; box-sizing: border-box; }
    button { background: #0078D4; color: white; border: none; font-size: 16px; }
    button.secondary { background: #444; }
    .row { display: flex; gap: 10px; }
    .row > * { flex: 1; }
    .small { font-size: 12px; color: #666; margin-top: 6px; }
    .success { color: green; }
    .error { color: #b00020; }
    .box { background: #f6f6f6; padding: 12px; border-radius: 8px; margin-top: 10px; }
    .label { margin-top: 14px; font-weight: 600; }
    .meter { font-size: 18px; font-weight: 700; }
    .muted { color: #555; }
    .wheels { display: flex; gap: 8px; margin-top: 10px; }
    .wheels select {
      flex: 1;
      text-align: center;
      font-size: 20px;
      height: 56px;
      padding: 10px;
      border-radius: 10px;
    }
    .chiprow { display:flex; gap:10px; margin-top:10px; }
    .chiprow button { width: auto; padding: 10px 12px; border-radius: 10px; }
    .hidden { display:none; }
  </style>
</head>
<body>

<h2>Submit Bore Reading</h2>

<div class="box">
  <div id="meterDisplay" class="meter"></div>
  <div id="lastDisplay" class="muted"></div>
  <div id="status" class="small"></div>
</div>

<form id="form">
  <input type="hidden" id="meter">

  <div class="label">Reading (5 digits)</div>

  <!-- 5-digit wheel UI -->
  <div class="wheels" aria-label="5 digit reading selector">
    <select id="d1"></select>
    <select id="d2"></select>
    <select id="d3"></select>
    <select id="d4"></select>
    <select id="d5"></select>
  </div>

  <!-- quick adjust buttons -->
  <div class="chiprow">
    <button type="button" class="secondary" id="btnMinus1">-1</button>
    <button type="button" class="secondary" id="btnPlus1">+1</button>
    <button type="button" class="secondary" id="btnPlus10">+10</button>
    <div style="flex:1"></div>
    <button type="button" class="secondary" id="btnUseLast">Use last</button>
  </div>

  <!-- fallback (hidden) -->
  <input type="text" id="readingText" class="hidden" inputmode="numeric" pattern="[0-9]{5}" />

  <div class="label">Photo (optional)</div>
  <input type="file" id="photo" accept="image/*" capture="environment">
  <div class="small">Tip: take photo straight-on, keep digits sharp, avoid glare.</div>

  <div class="label">Notes</div>
  <textarea id="notes" rows="3"></textarea>

  <button type="submit" id="submitBtn">Submit</button>
  <p id="message"></p>
</form>

<script>
  const API_BASE = "https://bore-reading-api-avi-fabag6gva8hgggh8.australiaeast-01.azurewebsites.net/api";

  const params = new URLSearchParams(window.location.search);
  const meter = params.get("meter") || "";

  document.getElementById("meter").value = meter;
  document.getElementById("meterDisplay").innerText = meter ? `Meter: ${meter}` : "Invalid QR link";

  let lastReading5 = null;

  const wheelIds = ["d1","d2","d3","d4","d5"];

  function initWheels() {
    for (const id of wheelIds) {
      const sel = document.getElementById(id);
      if (!sel) continue;
      sel.innerHTML = "";
      for (let n = 0; n <= 9; n++) {
        const opt = document.createElement("option");
        opt.value = String(n);
        opt.textContent = String(n);
        sel.appendChild(opt);
      }
      sel.value = "0";
    }
  }

  function setWheelFrom5Digits(five) {
    const s = (five || "").toString().replace(/\D/g, "").padStart(5, "0").slice(-5);
    for (let i = 0; i < 5; i++) {
      const el = document.getElementById(wheelIds[i]);
      if (el) el.value = s[i];
    }
  }

  function getWheelAs5Digits() {
    let s = "";
    for (let i = 0; i < 5; i++) {
      const el = document.getElementById(wheelIds[i]);
      s += (el ? el.value : "0");
    }
    return s.replace(/\D/g, "").padStart(5, "0").slice(-5);
  }

  function setStatus(msg) {
    document.getElementById("status").innerText = msg || "";
  }

  function setLastDisplay(text) {
    document.getElementById("lastDisplay").innerText = text || "";
  }

  function bump(delta) {
    const cur = parseInt(getWheelAs5Digits(), 10) || 0;
    let next = cur + delta;
    if (next < 0) next = 0;
    if (next > 99999) next = 99999;
    setWheelFrom5Digits(String(next).padStart(5, "0"));
  }

  async function loadLastReading() {
    if (!meter) {
      setLastDisplay("");
      setStatus("Missing meter in QR link.");
      return;
    }

    try {
      setStatus("Loading last reading...");
      const resp = await fetch(`${API_BASE}/GetLatestReading?meter=${encodeURIComponent(meter)}`);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();

      lastReading5 = data.lastReading5 || null;

      if (lastReading5) {
        setLastDisplay(`Last: ${lastReading5}`);
        setWheelFrom5Digits(lastReading5); // auto set
        setStatus("");
      } else {
        setLastDisplay("Last: -----");
        setStatus("No previous reading found (you can still submit).");
      }
    } catch (e) {
      console.error(e);
      lastReading5 = null;
      setLastDisplay("Last: -----");
      setStatus("Couldn't load last reading (you can still submit).");
    }
  }

  // init
  initWheels();
  loadLastReading();

  // buttons
  document.getElementById("btnUseLast").addEventListener("click", () => {
    if (lastReading5) setWheelFrom5Digits(lastReading5);
  });
  document.getElementById("btnMinus1").addEventListener("click", () => bump(-1));
  document.getElementById("btnPlus1").addEventListener("click", () => bump(1));
  document.getElementById("btnPlus10").addEventListener("click", () => bump(10));

  // submit
  document.getElementById("form").addEventListener("submit", async (e) => {
    e.preventDefault();

    const reading = getWheelAs5Digits();
    const notes = document.getElementById("notes").value || "";
    const file = document.getElementById("photo").files?.[0];

    let photo = null;
    if (file) {
      const reader = new FileReader();
      photo = await new Promise((resolve) => {
        reader.onload = () => resolve(reader.result.split(",")[1]);
        reader.readAsDataURL(file);
      });
    }

    setStatus("Submitting...");
    const resp = await fetch(`${API_BASE}/SubmitReading`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ meter, reading, notes, photo })
    });

    const text = await resp.text();
    document.getElementById("message").innerText = resp.ok ? "Submitted ✅" : text;

    if (resp.ok) {
      setStatus("");
      await loadLastReading();
    } else {
      setStatus("Submit failed.");
    }
  });
</script>

</body>
</html>
