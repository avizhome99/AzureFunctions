<!doctype html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bore Reading</title>
  <style>
    body { font-family: Arial; max-width: 520px; margin: 30px auto; padding: 0 14px; }
    input, textarea, button, select { width: 100%; padding: 12px; margin-top: 10px; box-sizing: border-box; }
    button { background: #0078D4; color: white; border: none; font-size: 16px; }
    button.secondary { background: #444; }
    .row { display: flex; gap: 10px; }
    .row > * { flex: 1; }
    .small { font-size: 12px; color: #666; margin-top: 6px; }
    .success { color: green; }
    .error { color: #b00020; }
    .box { background: #f6f6f6; padding: 12px; border-radius: 8px; margin-top: 10px; }
    .label { margin-top: 14px; font-weight: 600; }
    .meter { font-size: 18px; font-weight: 700; }
    .muted { color: #555; }
    .wheels { display: flex; gap: 8px; margin-top: 10px; }
    .wheels select {
      flex: 1;
      text-align: center;
      font-size: 20px;
      height: 56px;
      padding: 10px;
      border-radius: 10px;
    }
    .chiprow { display:flex; gap:10px; margin-top:10px; }
    .chiprow button { width: auto; padding: 10px 12px; border-radius: 10px; }
    .right { text-align:right; }
    .hidden { display:none; }
  </style>
</head>
<body>

<h2>Submit Bore Reading</h2>

<div class="box">
  <div id="meterDisplay" class="meter"></div>
  <div id="lastDisplay" class="muted"></div>
  <div id="status" class="small"></div>
</div>

<form id="form">
  <input type="hidden" id="meter">

  <div class="label">Reading (5 digits)</div>

  <!-- 5-digit wheel UI -->
  <div class="wheels" aria-label="5 digit reading selector">
    <select id="d1"></select>
    <select id="d2"></select>
    <select id="d3"></select>
    <select id="d4"></select>
    <select id="d5"></select>
  </div>

  <!-- Optional: quick adjust buttons -->
  <div class="chiprow">
    <button type="button" class="secondary" id="btnMinus1">-1</button>
    <button type="button" class="secondary" id="btnPlus1">+1</button>
    <button type="button" class="secondary" id="btnPlus10">+10</button>
    <div style="flex:1"></div>
    <button type="button" class="secondary" id="btnUseLast">Use last</button>
  </div>

  <!-- Still keep the plain input for accessibility / fallback (hidden by default) -->
  <input type="text" id="readingText" class="hidden" inputmode="numeric" pattern="[0-9]{5}" />

  <div class="label">Photo (optional)</div>
  <input type="file" id="photo" accept="image/*" capture="environment">
  <div class="small">Tip: take photo straight-on, keep digits sharp, avoid glare.</div>

  <div class="label">Notes</div>
  <textarea id="notes" rows="3"></textarea>

  <button type="submit" id="submitBtn">Submit</button>
  <p id="message"></p>
</form>

<script>
  const API_BASE = "https://bore-reading-api-avi-fabag6gva8hgggh8.australiaeast-01.azurewebsites.net/api";

  const params = new URLSearchParams(window.location.search);
  const meter = params.get("meter") || "";

  // store last reading globally so "Use last" works
  let lastReading5 = null;

  function setWheelFrom5Digits(five) {
    const s = (five || "").toString().padStart(5, "0").slice(0, 5);
    for (let i = 0; i < 5; i++) {
      const el = document.getElementById(`d${i}`);
      if (el) el.value = s[i];
    }
  }

  function getWheelAs5Digits() {
    let s = "";
    for (let i = 0; i < 5; i++) {
      const el = document.getElementById(`d${i}`);
      s += (el ? el.value : "0");
    }
    return s.padStart(5, "0").slice(0, 5);
  }

  function renderMeterBox({ ok, last }) {
    const box = document.getElementById("meterBox");
    if (!box) return;

    if (!meter) {
      box.innerHTML = `<strong>Invalid QR link</strong>`;
      return;
    }

    box.innerHTML = `
      <div><strong>Meter:</strong> ${meter}</div>
      <div><strong>Last:</strong> ${ok ? last : "Unavailable"}</div>
    `;
  }

  async function loadLastReading() {
    if (!meter) {
      renderMeterBox({ ok: false, last: "" });
      return;
    }

    try {
      const resp = await fetch(`${API_BASE}/GetLatestReading?meter=${encodeURIComponent(meter)}`);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

      const data = await resp.json();

      // IMPORTANT: use lastReading5 (not lastReadingRaw)
      lastReading5 = data.lastReading5 || null;

      renderMeterBox({ ok: !!lastReading5, last: lastReading5 || "-----" });

      // Optional: auto-set wheel to last reading
      if (lastReading5) setWheelFrom5Digits(lastReading5);

    } catch (e) {
      console.error("Failed to load last reading:", e);
      lastReading5 = null;
      renderMeterBox({ ok: false, last: "" });
    }
  }

  // Hook up Use Last button
  document.getElementById("useLastBtn")?.addEventListener("click", () => {
    if (lastReading5) setWheelFrom5Digits(lastReading5);
  });

  // Call on page load
  loadLastReading();

  // When you submit, use the wheel digits as your reading
  document.getElementById("form")?.addEventListener("submit", async (e) => {
    e.preventDefault();

    const reading = getWheelAs5Digits();
    const notes = document.getElementById("notes")?.value || "";
    const file = document.getElementById("photo")?.files?.[0];

    let photo = null;
    if (file) {
      const reader = new FileReader();
      photo = await new Promise((resolve) => {
        reader.onload = () => resolve(reader.result.split(",")[1]);
        reader.readAsDataURL(file);
      });
    }

    const resp = await fetch(`${API_BASE}/SubmitReading`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ meter, reading, notes, photo })
    });

    const text = await resp.text();
    document.getElementById("message").innerText = resp.ok ? "Submitted ✅" : text;

    // refresh last reading after submit
    if (resp.ok) await loadLastReading();
  });
</script>

</body>
</html>
